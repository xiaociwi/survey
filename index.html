  <style>
    :root {
      --bg-start: #0a0000;

      background: rgba(0,0,0,0.5);
      border: 1px solid #550000;
      border-radius: 6px;
      color: white;
      font-family: inherit;
      font-size: 1rem;
      transition: all 0.2s;

    input:focus, textarea:focus, select:focus {
      outline: none;
      border-color: var(--accent);
      box-shadow: 0 0 12px var(--accent-glow);
    }

    .radio-group, .checkbox-group {

    }

      display: flex;
      align-items: center;
      margin: 10px 0;
      cursor: pointer;
    }

    input[type="radio"], input[type="checkbox"] {
      margin-right: 12px;
      accent-color: var(--accent);
      transform: scale(1.3);
    }

    .scale {
      display: flex;
      justify-content: space-between;
      margin: 20px 0;
      flex-wrap: wrap;
    }

    .scale label {
      flex: 1 0 18%;
      text-align: center;
      margin: 8px;
      padding: 12px;
      background: rgba(255,0,51,0.08);
      border: 1px solid #550000;
      border-radius: 6px;
      cursor: pointer;
      transition: all 0.2s;
    }

    /* 关键：隐藏原生的 radio 圆点 */
    .scale input[type="radio"] {
      position: absolute;
      opacity: 0;
      width: 0;
      height: 0;
    }

    .scale input[type="radio"]:checked + label {
      background: var(--accent);
      color: black;
      box-shadow: var(--glow);
    }

    button {

      width: 100%;
      padding: 18px;
      margin-top: 40px;
      background: linear-gradient(90deg, #ff0033, #cc0000);
      color: white;
      font-size: 1.4rem;
      font-weight: bold;
      border: none;

      cursor: pointer;

</head>
